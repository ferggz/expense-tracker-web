{% extends "base.html" %}

{% block title %}Add Expense{% endblock %}

{% block content %}

<h1>Add Expense</h1>

<form method="POST">

    <input
        type="number"
        step="0.01"
        name="amount"
        placeholder="Amount"
        required
    >

    <input
        type="text"
        name="category"
        placeholder="Category"
        required
    >

    <input
        type="text"
        name="description"
        placeholder="Description"
        required
    >

    <input
        type="date"
        name="date"
        required
    >

    <button type="submit">Add expense</button>

</form>

{% endblock %}
