{% extends "base.html" %}

{% block title %}Edit Expense{% endblock %}

{% block content %}

<h1>Edit Expense</h1>

<form method="POST">

    <input
        type="number"
        step="0.01"
        name="amount"
        value="{{ expense['amount'] }}"
        required
    >

    <input
        type="text"
        name="category"
        value="{{ expense['category'] }}"
        required
    >

    <input
        type="text"
        name="description"
        value="{{ expense['description'] }}"
        required
    >

    <input
        type="date"
        name="date"
        value="{{ expense['date'] }}"
        required
    >

    <button type="submit">Save changes</button>

</form>

{% endblock %}
